<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}资源下载{% endblock %}</title>
    <link rel="stylesheet" href="{{ base_path }}/static/css/style.css">
</head>
<body>
    {% block content %}{% endblock %}
    <script>
        window.APP_CONFIG = {
            basePath: {{ base_path | tojson }},
            maxUploadMb: {{ max_upload_mb | tojson }}
        };
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
